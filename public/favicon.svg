<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <!-- Orb gradient -->
    <radialGradient id="orb" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0f0f2e"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer neon ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.4" filter="url(#softglow)"/>

  <!-- Middle ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>

  <!-- Main orb -->
  <circle cx="32" cy="32" r="16" fill="url(#orb)" filter="url(#glow)"/>

  <!-- Shine highlight -->
  <ellipse cx="27" cy="26" rx="5" ry="3" fill="white" opacity="0.25"/>

  <!-- Orbit ring (tilted) -->
  <ellipse cx="32" cy="32" rx="26" ry="8" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3" transform="rotate(-25 32 32)"/>

  <!-- Stars -->
  <circle cx="8"  cy="10" r="1"   fill="white" opacity="0.7"/>
  <circle cx="55" cy="12" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="12" cy="52" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="52" cy="50" r="1"   fill="white" opacity="0.7"/>
  <circle cx="4"  cy="35" r="0.6" fill="#22d3ee" opacity="0.8"/>
  <circle cx="59" cy="40" r="0.6" fill="#a855f7" opacity="0.8"/>
</svg>
